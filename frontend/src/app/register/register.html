<div class="form-container">
  <h1>Create Account</h1>
  
  <div class="input-group">
    <label>Username</label>
    <input type="text" [(ngModel)]="user.username" name="username" placeholder="Your name">
  </div>

  <div class="input-group">
    <label>Email</label>
    <input type="email" [(ngModel)]="user.email" name="email" placeholder="example@mail.com">
  </div>

  <div class="input-group">
    <label>Password</label>
    <input type="password" [(ngModel)]="user.password" name="password" placeholder="••••••••">
  </div>

  <button class="submit-btn" (click)="onRegister()">Register Now</button>
</div>
