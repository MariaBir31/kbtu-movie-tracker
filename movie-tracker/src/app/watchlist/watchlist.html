<div class="watchlist">
  <h3>My Watchlist <span class="count">{{ items.length }}</span></h3>

  <div class="items">
    @for (item of items; track item.id) {
      <div class="watch-item">
        <a [routerLink]="['/movie', item.movie.id]" class="item-info">
          <span class="item-title">{{ item.movie.title }}</span>
          <span class="item-year">{{ item.movie.year }}</span>
        </a>
        <button class="remove-btn" (click)="remove.emit(item.id)">×</button>
      </div>
    } @empty {
      <div class="empty">
        <p>Your list is empty.</p>
        <p>Add movies with<br><strong>+ Watchlist</strong></p>
      </div>
    }
  </div>
</div>
