<div class="page">
  <div class="form-card">
    <h1>Add New Movie</h1>

    @if (error) {
      <div class="error-box">{{ error }}</div>
    }

    @if (success) {
      <div class="success-box">{{ success }}</div>
    }

    <div class="form">
      <div class="field">
        <label>Title <span class="required">*</span></label>
        <input type="text" [(ngModel)]="title" name="title" placeholder="Movie title">
      </div>

      <div class="row">
        <div class="field">
          <label>Year <span class="required">*</span></label>
          <input type="number" [(ngModel)]="year" name="year" placeholder="2024">
        </div>

        <div class="field">
          <label>Genre <span class="required">*</span></label>
          <select [(ngModel)]="genreId" name="genre">
            <option [ngValue]="null" disabled>Select genre</option>
            @for (genre of genres; track genre.id) {
              <option [ngValue]="genre.id">{{ genre.name }}</option>
            }
          </select>
        </div>
      </div>

      <div class="field">
        <label>Image URL</label>
        <input type="text" [(ngModel)]="image" name="image" placeholder="https://...">
      </div>

      <div class="field">
        <label>Description</label>
        <textarea [(ngModel)]="description" name="description" rows="4" placeholder="Short description..."></textarea>
      </div>

      <div class="form-actions">
        <button class="cancel-btn" (click)="router.navigate(['/'])">Cancel</button>
        <button class="submit-btn" (click)="onSubmit()" [disabled]="loading">
          {{ loading ? 'Saving...' : 'Add Movie' }}
        </button>
      </div>
    </div>
  </div>
</div>
