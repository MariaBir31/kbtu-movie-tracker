<div class="page">
  <div class="page-header">
    <h1>All Movies</h1>
  </div>

  @if (error) {
    <div class="error-banner">{{ error }}</div>
  }

  @if (loading) {
    <div class="loading">Loading movies...</div>
  } @else {
    @if (movies.length === 0) {
      <div class="empty">No movies found.</div>
    } @else {
      <div class="movies-grid">
        @for (movie of movies; track movie.id) {
          <app-movie-card
            [movie]="movie"
            [isAdmin]="auth.isAdmin()"
            [inWatchlist]="watchlist.has(movie.id)"
            (addToWatchlist)="addToWatchlist($event)"
            (deleteMovie)="deleteMovie($event)">
          </app-movie-card>
        }
      </div>
    }
  }
</div>
