<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Welcome Back</h2>
      <p>Log in to manage your movie list</p>
    </div>

    @if (errorMessage()) {
      <div class="error-banner">
        {{ errorMessage() }}
      </div>
    }

    <form #loginForm="ngForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          [(ngModel)]="loginObj.username"
          required
          placeholder="Enter your username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="loginObj.password"
          required
          placeholder="••••••••">
      </div>

      <button
        type="button"
        class="btn-primary"
        (click)="onLogin()"
        [disabled]="!loginForm.valid">
        Sign In
      </button>
    </form>

    <div class="auth-footer">
      <p>New here? <a routerLink="/register">Create an account</a></p>
    </div>
  </div>
</div>
